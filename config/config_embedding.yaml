preferred_provider: openrouter
# Cross-provider fallback for the embedding entry point (core/embedding.py).
# Prod incident: OpenRouter qwen3-embedding-4b is a single provider with no
# fallback; on engine_overloaded (HTTP 429) the retry/backoff exhausted and PG
# retrieval collapsed. DeepInfra serves the SAME model (qwen3-embedding-4b,
# truncated to 1024 dims) so it is vector-space compatible.
# Set to null to disable fallback (preserves original single-provider behavior).
fallback_provider: deepinfra
providers:
  azure_openai:
    api_key_env: AZURE_OPENAI_API_KEY
    api_endpoint_env: AZURE_OPENAI_ENDPOINT
    api_version_env: "2024-10-21"  # Specific API version for embeddings
    model: text-embedding-3-small

  elasticsearch:
    # Elasticsearch endpoint (localhost or remote URL with Elastic Cloud/Serverless)
    api_endpoint_env: ELASTICSEARCH_URL
    # Authentication credentials
    api_key_env: ELASTICSEARCH_API_KEY
    # Model name (inference endpoint)
    model: .multilingual-e5-small-elasticsearch
    # Service configuration
    config: 
      service: elasticsearch
      service_settings:
        num_allocations: 1
        num_threads: 1
        model_id: .multilingual-e5-small_linux-x86_64

  gemini:
    api_key_env: GEMINI_API_KEY
    model: gemini-embedding-exp-03-07

  openai:
    api_key_env: OPENAI_API_KEY
    api_endpoint_env: OPENAI_ENDPOINT
    model: text-embedding-3-small

  snowflake:
    api_key_env: SNOWFLAKE_PAT
    api_endpoint_env: SNOWFLAKE_ACCOUNT_URL
    api_version_env: "2024-10-01"
    model: snowflake-arctic-embed-m-v1.5

  qwen3:
    model: Qwen/Qwen3-Embedding-4B

  openrouter:
    api_key_env: OPENROUTER_API_KEY
    model: qwen/qwen3-embedding-4b

  # Fallback for openrouter — SAME model (qwen3-embedding-4b), served by DeepInfra
  # under its HF id, truncated to 1024 dims for vector(1024) PG compatibility.
  deepinfra:
    api_key_env: DEEPINFRA_API_KEY
    model: Qwen/Qwen3-Embedding-4B