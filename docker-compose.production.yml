# NLWeb Production — VPS deployment (Hetzner CAX31 ARM64, 16GB RAM)
# Usage:
#   docker compose -f docker-compose.production.yml up -d --build
#   docker compose -f docker-compose.production.yml logs -f
#   docker compose -f docker-compose.production.yml down

services:
  postgres:
    build:
      context: ./infra
      dockerfile: Dockerfile
    container_name: nlweb-postgres
    restart: unless-stopped
    shm_size: '6g'
    environment:
      POSTGRES_USER: nlweb
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: nlweb
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    command:
      - "postgres"
      # Tuned for VPS CAX31 (16GB RAM, 8 vCPU ARM64)
      - "-c"
      - "shared_buffers=4GB"
      - "-c"
      - "work_mem=128MB"
      - "-c"
      - "maintenance_work_mem=512MB"
      - "-c"
      - "effective_cache_size=12GB"
      - "-c"
      - "max_connections=50"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "shared_preload_libraries=pg_bigm"
      - "-c"
      - "wal_buffers=64MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nlweb -d nlweb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    # No ports exposed to host — only accessible within Docker network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nlweb-app
    restart: unless-stopped
    user: root
    env_file:
      - .env
    environment:
      # Override local PG connection to point to Docker service
      POSTGRES_CONNECTION_STRING: "postgresql://nlweb:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/nlweb"
      NLWEB_LOGGING_PROFILE: production
      SENTRY_ENVIRONMENT: production
    volumes:
      - ./static:/app/static
      - appdata:/data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  nginx:
    image: nginx:alpine
    container_name: nlweb-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - internal

volumes:
  pgdata:
    driver: local
  appdata:
    driver: local

networks:
  internal:
    driver: bridge
