# NLWeb Production — nginx reverse proxy with Cloudflare Origin SSL
# Placed at: /etc/nginx/conf.d/default.conf (via Docker volume mount)
# Managed by GitHub Actions CI/CD

# SSE/WebSocket 條件式 Connection header:有 Upgrade → "upgrade"(WS),無 → ""(SSE/HTTP keep-alive)。
# 未來新增 WS endpoint 自動相容,不需改 location;移除「寫死 Connection 後忘了還原」的地雷。
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      "";
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name twdubao.com www.twdubao.com;
    return 301 https://$server_name$request_uri;
}

# HTTPS — Cloudflare Origin Certificate
server {
    listen 443 ssl;
    server_name twdubao.com www.twdubao.com;

    # Cloudflare Origin Certificate (15-year)
    ssl_certificate     /etc/nginx/ssl/origin.pem;
    ssl_certificate_key /etc/nginx/ssl/origin.key;

    # SSL settings (Cloudflare terminates public SSL, this is origin-to-Cloudflare)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Proxy to NLWeb app
    location / {
        proxy_pass http://app:8000;
        proxy_http_version 1.1;

        # SSE 是純 HTTP 長連線、不是 WebSocket。用 map 條件式 Connection:
        # 一般/SSE 請求(無 Upgrade header)→ ""(keep-alive 複用,對齊 /health);
        # 未來若有 WS endpoint 帶 Upgrade → "upgrade" 自動相容,不需改這裡。
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Forwarded headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 對齊 app 上傳上限 10MB（aiohttp client_max_size）。
        # 缺此指令時 nginx default 1m → 上傳 >1MB 在 body 到 app 前就 413。
        client_max_body_size 10m;

        # Long timeout for reasoning queries (can take 60-120s)
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # SSE: disable buffering for streaming responses
        proxy_buffering off;
        proxy_cache off;

        # Large headers (cookies, auth tokens)
        proxy_buffer_size 8k;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://app:8000/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_read_timeout 5s;
    }
}
